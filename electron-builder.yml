appId: io.github.kiruvex.imoodesktop
productName: iMooDesktop
copyright: Copyright (C) 2026 Kiruvex
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - package.json
asar: true
asarUnpack:
  - resources/bin/**
  - resources/edl/**
  - resources/scripts/**
  - node_modules/usb/**
  - node_modules/@node-usb/**
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  # 用 .ico(NSIS 原生格式),避免 PNG→ICO 转换失败导致 NSIS 编译告警
  icon: resources/assets/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: iMooDesktop
  # 关闭差异包(避免旧版本 patch 文件导致升级安装异常)
  differentialPackage: false
  # 卸载时不弹默认欢迎页(减少干扰弹窗)
  removeDefaultUninstallWelcomePage: true
  # 安装完成后运行应用(配合 installer.nsh 的 taskkill 确保干净升级)
  runAfterFinish: true
  # 不删用户数据
  deleteAppDataOnUninstall: false
  # 自定义 NSIS 脚本(安装前 taskkill 旧实例,避免写 exe 时"重试/取消")
  include: build/installer.nsh
portable:
  artifactName: ${productName}-${version}-portable.exe
