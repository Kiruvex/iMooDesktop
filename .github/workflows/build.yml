name: Build

on:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'main.py'
      - 'core/**'
      - 'storage/**'
      - 'workers/**'
      - 'bridge/**'
      - 'shell/**'
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'config.yaml'
      - 'EULA.txt'
      - 'build.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: '打包模式'
        required: true
        default: 'standalone'
        type: choice
        options:
          - standalone
          - onefile

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.mode }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        mode: [standalone]
        include:
          - os: ubuntu-latest
            mode: onefile
          - os: windows-latest
            mode: onefile
          - os: macos-latest
            mode: onefile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Ubuntu 24.04 (noble) 包名变更：
          #   libgl1-mesa-glx → libgl1
          #   libegl1-mesa    → libegl1
          #   libasound2      → libasound2t64（虚拟包，显式选 t64 版）
          sudo apt-get install -y \
            build-essential \
            patchelf \
            libgl1 \
            libegl1 \
            libglx-mesa0 \
            libnss3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libasound2t64 \
            libxtst6 \
            libxshmfence1 \
            libfontconfig1 \
            libdbus-1-3

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          # Nuitka 需要 imageio 把 PNG 图标转成 macOS 原生格式
          pip install imageio
          brew install patchelf || true

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build frontend
        run: |
          cd frontend
          bun install
          bun run build

      - name: Verify frontend dist
        shell: bash
        run: |
          if [ ! -f frontend/dist/index.html ]; then
            echo "✗ frontend/dist/index.html 不存在，前端构建失败"
            exit 1
          fi
          echo "✓ 前端构建成功"
          ls -la frontend/dist/

      - name: Determine build mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            echo "mode=${{ matrix.mode }}" >> $GITHUB_OUTPUT
          fi

      - name: Nuitka build
        shell: bash
        run: |
          python build.py --mode ${{ steps.mode.outputs.mode }} --no-frontend --output-name iMooDesktop
        env:
          PYTHONUNBUFFERED: '1'
          # Windows 控制台默认 cp1252 编码，print 中文会 UnicodeEncodeError
          PYTHONIOENCODING: 'utf-8'

      - name: Verify build output
        shell: bash
        run: |
          echo "=== 构建产物 ==="
          if [ "${{ steps.mode.outputs.mode }}" = "onefile" ]; then
            if [ "${{ runner.os }}" = "Windows" ]; then
              ls -lh build/iMooDesktop.exe || { echo "✗ 未找到 onefile 产物"; exit 1; }
            else
              ls -lh build/iMooDesktop.bin || ls -lh build/iMooDesktop || { echo "✗ 未找到 onefile 产物"; exit 1; }
            fi
          else
            if [ "${{ runner.os }}" = "Windows" ]; then
              ls -lh build/iMooDesktop.dist/iMooDesktop.exe || { echo "✗ 未找到 standalone 产物"; exit 1; }
              echo "=== .dist 目录大小 ==="
              du -sh build/iMooDesktop.dist/
            else
              ls -lh build/iMooDesktop.dist/iMooDesktop || { echo "✗ 未找到 standalone 产物"; exit 1; }
              echo "=== .dist 目录大小 ==="
              du -sh build/iMooDesktop.dist/
            fi
          fi
          echo "✓ 构建成功"

      - name: Package standalone (zip)
        if: steps.mode.outputs.mode == 'standalone'
        shell: bash
        run: |
          cd build
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a -tzip iMooDesktop-${{ runner.os }}-standalone.zip iMooDesktop.dist
          else
            tar -czf iMooDesktop-${{ runner.os }}-standalone.tar.gz iMooDesktop.dist
          fi
          ls -lh iMooDesktop-${{ runner.os }}-standalone.*

      - name: Upload standalone artifact
        if: steps.mode.outputs.mode == 'standalone'
        uses: actions/upload-artifact@v4
        with:
          name: iMooDesktop-${{ runner.os }}-standalone
          path: |
            build/iMooDesktop-${{ runner.os }}-standalone.zip
            build/iMooDesktop-${{ runner.os }}-standalone.tar.gz
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload onefile artifact
        if: steps.mode.outputs.mode == 'onefile'
        uses: actions/upload-artifact@v4
        with:
          name: iMooDesktop-${{ runner.os }}-onefile
          path: |
            build/iMooDesktop.exe
            build/iMooDesktop.bin
            build/iMooDesktop
          if-no-files-found: ignore
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== 下载的产物 ==="
          find artifacts -type f | sort
          echo "=== 大小 ==="
          du -sh artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: iMoo Desktop ${{ github.ref_name }}
          body: |
            ## iMoo Desktop ${{ github.ref_name }}

            ### 下载

            | 平台 | 模式 | 文件 |
            |------|------|------|
            | Windows | standalone (推荐) | `iMooDesktop-Windows-standalone.zip` |
            | Windows | onefile | `iMooDesktop-Windows-onefile/*` |
            | macOS | standalone | `iMooDesktop-macOS-standalone.tar.gz` |
            | macOS | onefile | `iMooDesktop-macOS-onefile/*` |
            | Linux | standalone | `iMooDesktop-Linux-standalone.tar.gz` |
            | Linux | onefile | `iMooDesktop-Linux-onefile/*` |

            ### 使用方式

            **standalone 模式**：解压后运行目录内的 `iMooDesktop`（Linux/macOS）或 `iMooDesktop.exe`（Windows）。

            **onefile 模式**：直接运行单个可执行文件。

            ### 系统依赖（Linux）

            ```bash
            sudo apt install libgl1-mesa-glx libegl1-mesa libnss3 libxkbcommon0 \
              libxcomposite1 libxdamage1 libxrandr2 libasound2 libxtst6 \
              libxshmfence1 libfontconfig1 libdbus-1-3
            ```

            ### 首次启动

            首次启动会弹出 EULA 许可协议对话框，阅读并同意后方可使用。

            ---
            **完整变更记录**见 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: |
            artifacts/*/iMooDesktop-*
            artifacts/*/*.exe
            artifacts/*/*.bin
          draft: false
          prerelease: false
          generate_release_notes: false
