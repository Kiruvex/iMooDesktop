name: Build

on:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'main.py'
      - 'core/**'
      - 'storage/**'
      - 'workers/**'
      - 'bridge/**'
      - 'shell/**'
      - 'frontend/src/**'
      - 'frontend/package.json'
      - 'config.yaml'
      - 'EULA.txt'
      - 'assets/icons/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend
        run: bun install

      - name: Build
        working-directory: frontend
        run: bun run build

      - name: Verify dist
        run: |
          if [ ! -f frontend/dist/index.html ]; then
            echo "✗ frontend/dist/index.html 不存在，前端构建失败"
            exit 1
          fi
          echo "✓ 前端构建成功"
          ls -la frontend/dist/

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  build-linux:
    name: Linux x86_64
    needs: build-frontend
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # ubuntu-22.04 包名稳定（不是 noble 的 t64 变体）
          # 这些是 PySide6 + QtWebEngine 实际需要的运行库
          sudo apt-get install -y \
            patchelf \
            libgl1-mesa-glx \
            libegl1 \
            libopengl0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libasound2 \
            libxtst6 \
            libxshmfence1 \
            libfontconfig1 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 PySide6-Addons nuitka requests PyYAML Pillow imageio ordered-set

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone \
            --enable-plugin=pyside6 \
            --include-data-files=config.yaml=config.yaml \
            --include-data-files=EULA.txt=EULA.txt \
            --include-data-dir=frontend/dist=frontend/dist \
            --include-data-dir=assets/icons=assets/icons \
            --include-package=PySide6.QtCore \
            --include-package=PySide6.QtGui \
            --include-package=PySide6.QtWidgets \
            --include-package=PySide6.QtNetwork \
            --include-package=PySide6.QtWebEngineWidgets \
            --include-package=PySide6.QtWebEngineCore \
            --include-package=PySide6.QtWebChannel \
            --include-package=PySide6.QtPrintSupport \
            --include-package=PIL \
            --include-package=yaml \
            --include-package=requests \
            --include-module=core.im_client \
            --include-module=core.image_uploader \
            --include-module=core.moment_parser \
            --include-module=core.num_crypto \
            --include-module=core.watch_api \
            --include-module=storage.cache_store \
            --include-module=storage.config_store \
            --include-module=storage.log_store \
            --include-module=workers.base_worker \
            --include-module=bridge.app_bridge \
            --include-module=shell.main_window \
            --linux-icon=assets/icons/app.png \
            --output-filename=iMooDesktop \
            --output-dir=build \
            --remove-output \
            --file-reference-choice=runtime \
            --assume-yes-for-downloads \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=unittest \
            --nofollow-import-to=pydoc \
            --nofollow-import-to=doctest \
            --nofollow-import-to=test \
            --nofollow-import-to=tests \
            --nofollow-import-to=setuptools \
            --nofollow-import-to=lib2to3 \
            --nofollow-import-to=ensurepip \
            --nofollow-import-to=venv \
            --nofollow-import-to=idlelib \
            --nofollow-import-to=distutils \
            main.py
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONIOENCODING: 'utf-8'

      - name: Inspect build output
        run: |
          echo "=== Looking for executable ==="
          find build/main.dist/ -maxdepth 1 -type f \( -name "iMooDesktop*" -o -name "main*" \) 2>/dev/null
          echo ""
          echo "=== Checking data dirs ==="
          ls -la build/main.dist/frontend/dist/ 2>/dev/null || echo "frontend/dist/ NOT FOUND"
          ls -la build/main.dist/config.yaml 2>/dev/null || echo "config.yaml NOT FOUND"
          ls -la build/main.dist/EULA.txt 2>/dev/null || echo "EULA.txt NOT FOUND"
          ls -la build/main.dist/assets/icons/ 2>/dev/null || echo "assets/icons/ NOT FOUND"
          echo ""
          echo "=== Disk usage ==="
          du -sh build/main.dist/

      - name: Package
        run: |
          DIST_DIR="build/main.dist"

          # Nuitka 可能忽略 --output-filename，修正可执行文件名
          if [ -f "$DIST_DIR/iMooDesktop" ]; then
            echo "iMooDesktop binary already exists"
          elif [ -f "$DIST_DIR/main.bin" ]; then
            mv "$DIST_DIR/main.bin" "$DIST_DIR/iMooDesktop"
            echo "Renamed main.bin -> iMooDesktop"
          elif [ -f "$DIST_DIR/main" ]; then
            mv "$DIST_DIR/main" "$DIST_DIR/iMooDesktop"
            echo "Renamed main -> iMooDesktop"
          else
            echo "ERROR: No iMooDesktop/main.bin/main executable found!"
            find "$DIST_DIR" -maxdepth 1 -type f -executable
            exit 1
          fi
          chmod +x "$DIST_DIR/iMooDesktop"

          cd "$DIST_DIR"

          echo "=== 清理前 ==="
          du -sh .

          # 1. 删除未使用的 PySide6 模块（只保留 QtCore/QtGui/QtWidgets/QtNetwork/
          #    QtWebEngineWidgets/QtWebEngineCore/QtWebChannel/QtPrintSupport）
          echo "--- 删除未用 PySide6 模块 ---"
          KEEP_QT="QtCore|QtGui|QtWidgets|QtNetwork|QtWebEngineWidgets|QtWebEngineCore|QtWebChannel|QtPrintSupport"
          if [ -d "PySide6" ]; then
            for f in PySide6/Qt*.so; do
              mod=$(basename "$f" .so)
              if ! echo "$mod" | grep -qE "^($KEEP_QT)"; then
                echo "  删除 $f"
                rm -f "$f"
              fi
            done
            # 删除 PySide6 子模块目录
            for d in PySide6/Qt3D* PySide6/QtBluetooth PySide6/QtCharts \
                     PySide6/QtDataVisualization PySide6/QtDesigner PySide6/QtHelp \
                     PySide6/QtLocation PySide6/QtMultimedia* PySide6/QtNetworkAuth \
                     PySide6/QtNfc PySide6/QtPositioning PySide6/QtQml PySide6/QtQuick* \
                     PySide6/QtRemoteObjects PySide6/QtScxml PySide6/QtSensors \
                     PySide6/QtSerial* PySide6/QtSpatialAudio PySide6/QtSql \
                     PySide6/QtStateMachine PySide6/QtSvg PySide6/QtTest \
                     PySide6/QtTextToSpeech PySide6/QtUiTools PySide6/QtVirtualKeyboard \
                     PySide6/QtWebSockets PySide6/QtXml PySide6/examples PySide6/docs; do
              if [ -e "$d" ]; then
                echo "  删除 $d"
                rm -rf "$d"
              fi
            done
          fi

          # 2. strip 调试符号（.so/.dylib，省 20-40MB）
          echo "--- strip 调试符号 ---"
          find . -name "*.so" -exec strip --strip-unneeded {} \; 2>/dev/null || true
          find . -name "*.dylib" -exec strip -x {} \; 2>/dev/null || true

          # 3. 清理翻译文件（只保留中英文）
          echo "--- 清理翻译文件 ---"
          find . -maxdepth 1 -name '*.qm' ! -name '*zh*' ! -name '*en*' -delete 2>/dev/null || true
          rm -f assistant_*.qm designer_*.qm linguist_*.qm 2>/dev/null || true
          if [ -d "PySide6/translations" ]; then
            find PySide6/translations/ -name '*.qm' ! -name '*zh*' ! -name '*en*' -delete 2>/dev/null || true
          fi
          if [ -d "qtwebengine_locales" ]; then
            find qtwebengine_locales/ -name '*.pak' ! -name '*zh*' ! -name '*en*' -delete 2>/dev/null || true
          fi

          # 4. 删除 imageio 运行时（仅打包时用于图标转换）
          echo "--- 删除 imageio ---"
          rm -rf imageio* 2>/dev/null || true

          # 5. 清理 Pillow 未用插件（保留常用格式：JPEG/PNG/WebP/GIF/BMP/TIFF）
          echo "--- 清理 Pillow 插件 ---"
          if [ -d "PIL" ]; then
            KEEP_PIL="_webp|_png|_jpeg|_gif|_bmp|_tiff|_imaging|Image|ImageFile|ImageMode|ImagePalette|ImageSequence|ImageColor|ImageFilter|ImageFont|ImageDraw|ImageChops|ImageOps|ImageStat|ImageTransform|ImageCms|ImageMath|ImageWin|BmpImagePlugin|JpegImagePlugin|PngImagePlugin|GifImagePlugin|TiffImagePlugin|WebPImagePlugin|IcoImagePlugin|PpmImagePlugin"
            for f in PIL/*.py; do
              mod=$(basename "$f" .py)
              if ! echo "$mod" | grep -qE "^($KEEP_PIL)"; then
                rm -f "$f" "${f}c"
              fi
            done
          fi

          # 6. 清理 Python 标准库残余
          echo "--- 清理标准库残余 ---"
          rm -rf lib2to3* ensurepip* venv* idlelib* distutils* 2>/dev/null || true
          rm -rf pydoc_data 2>/dev/null || true

          # 7. 删除 __pycache__ / .pyc
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true

          echo "=== 清理后 ==="
          du -sh .
          echo "=== 模块数 ==="
          find . -name "*.so" | wc -l

          tar czf "$GITHUB_WORKSPACE/iMooDesktop-Linux-x86_64.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iMooDesktop-Linux
          path: iMooDesktop-*.tar.gz
          retention-days: 30

  build-windows:
    name: Windows x86_64
    needs: build-frontend
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 PySide6-Addons nuitka requests PyYAML Pillow imageio ordered-set

      - name: Build with Nuitka
        shell: bash
        run: |
          python -m nuitka --standalone \
            --enable-plugin=pyside6 \
            --include-data-files=config.yaml=config.yaml \
            --include-data-files=EULA.txt=EULA.txt \
            --include-data-dir=frontend/dist=frontend/dist \
            --include-data-dir=assets/icons=assets/icons \
            --include-package=PySide6.QtCore \
            --include-package=PySide6.QtGui \
            --include-package=PySide6.QtWidgets \
            --include-package=PySide6.QtNetwork \
            --include-package=PySide6.QtWebEngineWidgets \
            --include-package=PySide6.QtWebEngineCore \
            --include-package=PySide6.QtWebChannel \
            --include-package=PySide6.QtPrintSupport \
            --include-package=PIL \
            --include-package=yaml \
            --include-package=requests \
            --include-package=imageio \
            --include-module=core.im_client \
            --include-module=core.image_uploader \
            --include-module=core.moment_parser \
            --include-module=core.num_crypto \
            --include-module=core.watch_api \
            --include-module=storage.cache_store \
            --include-module=storage.config_store \
            --include-module=storage.log_store \
            --include-module=workers.base_worker \
            --include-module=bridge.app_bridge \
            --include-module=shell.main_window \
            --windows-icon-from-ico=assets/icons/app.ico \
            --windows-console-mode=disable \
            --windows-company-name=iMooDesktop \
            --windows-product-name="iMoo Desktop" \
            --windows-file-version=1.0.0.0 \
            --windows-product-version=1.0.0.0 \
            --output-filename=iMooDesktop.exe \
            --output-dir=build \
            --remove-output \
            --file-reference-choice=runtime \
            --assume-yes-for-downloads \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=unittest \
            --nofollow-import-to=pydoc \
            --nofollow-import-to=doctest \
            --nofollow-import-to=test \
            --nofollow-import-to=tests \
            --nofollow-import-to=setuptools \
            main.py
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONIOENCODING: 'utf-8'

      - name: Inspect build output
        shell: bash
        run: |
          echo "=== Looking for executable ==="
          find build/main.dist/ -maxdepth 1 -type f \( -name "iMooDesktop*" -o -name "main*" \) 2>/dev/null
          echo ""
          echo "=== Checking data dirs ==="
          ls -la build/main.dist/frontend/dist/ 2>/dev/null || echo "frontend/dist/ NOT FOUND"
          ls -la build/main.dist/config.yaml 2>/dev/null || echo "config.yaml NOT FOUND"
          ls -la build/main.dist/EULA.txt 2>/dev/null || echo "EULA.txt NOT FOUND"

      - name: Package
        shell: pwsh
        run: |
          $distDir = "build/main.dist"

          # Nuitka 可能忽略 --output-filename，修正可执行文件名
          if (Test-Path "$distDir/main.exe") {
            Move-Item -Force "$distDir/main.exe" "$distDir/iMooDesktop.exe"
            Write-Host "Renamed main.exe -> iMooDesktop.exe"
          } elseif (-not (Test-Path "$distDir/iMooDesktop.exe")) {
            Write-Host "ERROR: No iMooDesktop.exe/main.exe found!"
            Get-ChildItem "$distDir" -Filter "*.exe" | ForEach-Object { Write-Host $_.Name }
            exit 1
          }

          Write-Host "=== 清理前 ==="
          $size = (Get-ChildItem "$distDir" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host ("{0:N1} MB" -f $size)

          # 1. 删除未使用的 PySide6 模块（.pyd/.dll）
          Write-Host "--- 删除未用 PySide6 模块 ---"
          $keepQt = "QtCore","QtGui","QtWidgets","QtNetwork","QtWebEngineWidgets","QtWebEngineCore","QtWebChannel","QtPrintSupport"
          if (Test-Path "$distDir\PySide6") {
            Get-ChildItem "$distDir\PySide6\Qt*.pyd","$distDir\PySide6\Qt*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
              $mod = $_.BaseName
              if ($keepQt -notcontains $mod) {
                Write-Host "  删除 $($_.Name)"
                Remove-Item -Force $_.FullName
              }
            }
            # 删除子模块目录
            $unusedDirs = "Qt3D*","QtBluetooth","QtCharts","QtDataVisualization","QtDesigner","QtHelp","QtLocation","QtMultimedia*","QtNetworkAuth","QtNfc","QtPositioning","QtQml","QtQuick*","QtRemoteObjects","QtScxml","QtSensors","QtSerial*","QtSpatialAudio","QtSql","QtStateMachine","QtSvg","QtTest","QtTextToSpeech","QtUiTools","QtVirtualKeyboard","QtWebSockets","QtXml","examples","docs"
            foreach ($pattern in $unusedDirs) {
              Get-ChildItem "$distDir\PySide6\$pattern" -ErrorAction SilentlyContinue | ForEach-Object {
                Write-Host "  删除 $($_.FullName)"
                Remove-Item -Recurse -Force $_.FullName
              }
            }
          }

          # 2. 清理翻译文件（只保留中英文）
          Write-Host "--- 清理翻译文件 ---"
          Get-ChildItem "$distDir\*.qm" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch 'zh|en' } | Remove-Item -Force
          if (Test-Path "$distDir\PySide6\translations") {
            Get-ChildItem "$distDir\PySide6\translations\*.qm" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch 'zh|en' } | Remove-Item -Force
          }
          if (Test-Path "$distDir\qtwebengine_locales") {
            Get-ChildItem "$distDir\qtwebengine_locales\*.pak" -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch 'zh|en' } | Remove-Item -Force
          }

          # 3. 删除 imageio 运行时
          Write-Host "--- 删除 imageio ---"
          Get-ChildItem "$distDir" -Filter "imageio*" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force

          # 4. 清理 Python 标准库残余
          Write-Host "--- 清理标准库残余 ---"
          foreach ($d in "lib2to3","ensurepip","venv","idlelib","distutils","pydoc_data") {
            Get-ChildItem "$distDir" -Filter "$d*" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          }

          # 5. 删除 __pycache__ / .pyc
          Get-ChildItem "$distDir" -Recurse -Directory -Filter "__pycache__" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force
          Get-ChildItem "$distDir" -Recurse -Filter "*.pyc" -ErrorAction SilentlyContinue | Remove-Item -Force

          Write-Host "=== 清理后 ==="
          $size = (Get-ChildItem "$distDir" -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host ("{0:N1} MB" -f $size)

          Compress-Archive -Path "$distDir/*" -DestinationPath "iMooDesktop-Windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iMooDesktop-Windows
          path: iMooDesktop-*.zip
          retention-days: 30

  build-macos:
    name: macOS arm64
    needs: build-frontend
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 PySide6-Addons nuitka requests PyYAML Pillow imageio ordered-set

      - name: Build with Nuitka
        run: |
          # macOS 上 QtWebEngine 必须用 --mode=app（生成 .app bundle）
          python -m nuitka --mode=app \
            --enable-plugin=pyside6 \
            --include-data-files=config.yaml=config.yaml \
            --include-data-files=EULA.txt=EULA.txt \
            --include-data-dir=frontend/dist=frontend/dist \
            --include-data-dir=assets/icons=assets/icons \
            --include-package=PySide6.QtCore \
            --include-package=PySide6.QtGui \
            --include-package=PySide6.QtWidgets \
            --include-package=PySide6.QtNetwork \
            --include-package=PySide6.QtWebEngineWidgets \
            --include-package=PySide6.QtWebEngineCore \
            --include-package=PySide6.QtWebChannel \
            --include-package=PySide6.QtPrintSupport \
            --include-package=PIL \
            --include-package=yaml \
            --include-package=requests \
            --include-package=imageio \
            --include-module=core.im_client \
            --include-module=core.image_uploader \
            --include-module=core.moment_parser \
            --include-module=core.num_crypto \
            --include-module=core.watch_api \
            --include-module=storage.cache_store \
            --include-module=storage.config_store \
            --include-module=storage.log_store \
            --include-module=workers.base_worker \
            --include-module=bridge.app_bridge \
            --include-module=shell.main_window \
            --macos-app-icon=assets/icons/app.icns \
            --output-filename=iMooDesktop \
            --output-dir=build \
            --remove-output \
            --file-reference-choice=runtime \
            --assume-yes-for-downloads \
            --nofollow-import-to=tkinter \
            --nofollow-import-to=unittest \
            --nofollow-import-to=pydoc \
            --nofollow-import-to=doctest \
            --nofollow-import-to=test \
            --nofollow-import-to=tests \
            --nofollow-import-to=setuptools \
            main.py
        env:
          PYTHONUNBUFFERED: '1'
          PYTHONIOENCODING: 'utf-8'

      - name: Inspect build output
        run: |
          echo "=== build/ 目录内容 ==="
          ls -la build/

          # Nuitka --mode=app 产物用源文件名命名（main.app），不是 iMooDesktop.app
          # 找到 .app 并重命名为 iMooDesktop.app
          APP_SRC=""
          for d in build/*.app; do
            if [ -d "$d" ]; then
              APP_SRC="$d"
              break
            fi
          done

          if [ -z "$APP_SRC" ]; then
            echo "✗ 未找到 .app 产物"
            find build/ -maxdepth 2 -type d | head -20
            exit 1
          fi

          echo "=== 找到 .app: $APP_SRC ==="

          # 重命名为 iMooDesktop.app
          if [ "$APP_SRC" != "build/iMooDesktop.app" ]; then
            mv "$APP_SRC" build/iMooDesktop.app
            echo "重命名: $APP_SRC → build/iMooDesktop.app"
          fi

          echo ""
          echo "=== .app 结构 ==="
          ls -la build/iMooDesktop.app/
          ls -la build/iMooDesktop.app/Contents/ 2>/dev/null || echo "Contents/ NOT FOUND"
          echo ""
          echo "=== 数据文件检查 ==="
          # Nuitka --mode=app 数据文件在 Contents/MacOS/ 下
          ls -la build/iMooDesktop.app/Contents/MacOS/frontend/dist/ 2>/dev/null || echo "frontend/dist/ NOT FOUND"
          ls -la build/iMooDesktop.app/Contents/MacOS/config.yaml 2>/dev/null || echo "config.yaml NOT FOUND"
          ls -la build/iMooDesktop.app/Contents/MacOS/EULA.txt 2>/dev/null || echo "EULA.txt NOT FOUND"
          echo ""
          echo "=== Disk usage ==="
          du -sh build/iMooDesktop.app/

      - name: Package
        run: |
          APP_DIR="build/iMooDesktop.app/Contents/MacOS"

          echo "=== 清理前 ==="
          du -sh build/iMooDesktop.app/

          if [ -d "$APP_DIR" ]; then
            cd "$APP_DIR"

            # 1. 删除未使用的 PySide6 模块（.so/.dylib）
            echo "--- 删除未用 PySide6 模块 ---"
            KEEP_QT="QtCore|QtGui|QtWidgets|QtNetwork|QtWebEngineWidgets|QtWebEngineCore|QtWebChannel|QtPrintSupport"
            if [ -d "PySide6" ]; then
              for f in PySide6/Qt*.so PySide6/Qt*.dylib; do
                [ -e "$f" ] || continue
                mod=$(basename "$f" | sed 's/\.so$//;s/\.dylib$//')
                if ! echo "$mod" | grep -qE "^($KEEP_QT)"; then
                  rm -f "$f"
                fi
              done
              for d in PySide6/Qt3D* PySide6/QtBluetooth PySide6/QtCharts \
                       PySide6/QtDataVisualization PySide6/QtDesigner PySide6/QtHelp \
                       PySide6/QtLocation PySide6/QtMultimedia* PySide6/QtNetworkAuth \
                       PySide6/QtNfc PySide6/QtPositioning PySide6/QtQml PySide6/QtQuick* \
                       PySide6/QtRemoteObjects PySide6/QtScxml PySide6/QtSensors \
                       PySide6/QtSerial* PySide6/QtSpatialAudio PySide6/QtSql \
                       PySide6/QtStateMachine PySide6/QtSvg PySide6/QtTest \
                       PySide6/QtTextToSpeech PySide6/QtUiTools PySide6/QtVirtualKeyboard \
                       PySide6/QtWebSockets PySide6/QtXml PySide6/examples PySide6/docs; do
                [ -e "$d" ] && rm -rf "$d"
              done
            fi

            # 2. strip 调试符号（macOS .dylib/.so）
            echo "--- strip 调试符号 ---"
            find . -name "*.so" -exec strip -x {} \; 2>/dev/null || true
            find . -name "*.dylib" -exec strip -x {} \; 2>/dev/null || true

            # 3. 清理翻译文件
            echo "--- 清理翻译文件 ---"
            find . -maxdepth 1 -name '*.qm' ! -name '*zh*' ! -name '*en*' -delete 2>/dev/null || true
            [ -d "PySide6/translations" ] && find PySide6/translations/ -name '*.qm' ! -name '*zh*' ! -name '*en*' -delete 2>/dev/null || true
            [ -d "qtwebengine_locales" ] && find qtwebengine_locales/ -name '*.pak' ! -name '*zh*' ! -name '*en*' -delete 2>/dev/null || true

            # 4. 删除 imageio
            rm -rf imageio* 2>/dev/null || true

            # 5. 清理标准库残余
            rm -rf lib2to3* ensurepip* venv* idlelib* distutils* pydoc_data 2>/dev/null || true

            # 6. 删除 __pycache__ / .pyc
            find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
            find . -name "*.pyc" -delete 2>/dev/null || true
          else
            echo "⚠ APP_DIR 不存在: $APP_DIR，跳过清理"
          fi

          echo "=== 清理后 ==="
          du -sh build/iMooDesktop.app/

          cd "$GITHUB_WORKSPACE/build"
          zip -r -y iMooDesktop-macos-arm64.zip iMooDesktop.app
          ls -lh iMooDesktop-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iMooDesktop-macOS
          path: build/iMooDesktop-macos-*.zip
          retention-days: 30

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: |
          echo "=== 下载的产物 ==="
          find artifacts -type f | sort
          echo "=== 大小 ==="
          du -sh artifacts/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: iMoo Desktop ${{ github.ref_name }}
          body: |
            ## iMoo Desktop ${{ github.ref_name }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | Windows | `iMooDesktop-Windows-x86_64.zip` |
            | macOS (Apple Silicon) | `iMooDesktop-macos-arm64.zip` |
            | Linux | `iMooDesktop-Linux-x86_64.tar.gz` |

            ### 使用方式

            - **Windows**：解压后运行 `iMooDesktop.exe`
            - **macOS**：解压后双击 `iMooDesktop.app`
            - **Linux**：解压后运行 `./iMooDesktop`

            ### 系统依赖（Linux）

            ```bash
            sudo apt install libgl1-mesa-glx libegl1 libnss3 libxkbcommon0 \
              libxcomposite1 libxdamage1 libxrandr2 libasound2 libxtst6 \
              libxshmfence1 libfontconfig1 libdbus-1-3
            ```

            ### 首次启动

            首次启动会弹出 EULA 许可协议对话框，阅读并同意后方可使用。

            ---
            **完整变更记录**见 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: |
            artifacts/**/iMooDesktop-*
          draft: false
          prerelease: false
          generate_release_notes: false
