<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iMoo Desktop</title>
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="iMoo Desktop - 小天才手表桌面控制工具" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script>
      // FOUC 防护：在 React/Preact 渲染前先根据 localStorage 应用主题，
      // 避免页面加载时闪一下默认（浅色）再被 hook 切到深色。
      // 与 frontend/src/lib/useTheme.ts 的 THEME_KEY='imoo_theme' 保持一致。
      (function () {
        try {
          var stored = localStorage.getItem('imoo_theme');
          var theme = stored === 'light' || stored === 'dark' || stored === 'system'
            ? stored
            : 'system';
          var dark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.add(dark ? 'dark' : 'light');
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {
          // localStorage / matchMedia 不可用时静默降级到默认浅色
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
